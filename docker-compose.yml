services:
  mysql:
    image: mysql:8.0
    container_name: hmdp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: hmdp
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/db/hmdp.sql:/docker-entrypoint-initdb.d/01-hmdp.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: hmdp-redis
    restart: unless-stopped
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    volumes:
      - redis-data:/data
      - ./backend/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis-init:
    image: redis:7.4-alpine
    container_name: hmdp-redis-init
    depends_on:
      redis:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - redis-cli -h redis -p 6379 XGROUP CREATE stream.orders g1 $ MKSTREAM || true
    restart: "no"

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: hmdp-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd-data:/etcd

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: hmdp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  milvus:
    image: milvusdb/milvus:v2.5.10
    container_name: hmdp-milvus
    restart: unless-stopped
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      COMMON_STORAGETYPE: local
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hmdp-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-init:
        condition: service_completed_successfully
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8081
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: hmdp
      MYSQL_USER: root
      MYSQL_PASSWORD: "root"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      RAG_OLLAMA_BASE_URL: http://host.docker.internal:11434
      RAG_MILVUS_HOST: milvus
      RAG_MILVUS_PORT: 19530
    ports:
      - "8081:8081"
    volumes:
      - ./docs:/app/docs:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: hmdp-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"

volumes:
  mysql-data:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
